<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreeMiD Settings</title>
    <style>
      :root {
        --bg-0: #0f1014;
        --bg-1: #16181f;
        --bg-2: #1d2029;
        --border: #262a36;
        --text-0: #f4f5f8;
        --text-1: #c4c8d4;
        --text-2: #7d8395;
        --accent: #5865f2;
        --accent-strong: #7983f5;
        --accent-soft: rgba(88, 101, 242, 0.18);
        --success: #2dd17a;
        --warning: #f0b232;
        --danger: #ed4245;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg-0);
        color: var(--text-0);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }

      .page {
        max-width: 480px;
        margin: 0 auto;
        padding: 32px 24px 64px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 24px;
      }
      .logo { width: 32px; height: 32px; border-radius: 8px; }
      h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }

      section {
        background: var(--bg-1);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 18px 20px;
        margin-bottom: 16px;
      }

      .section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-2);
        margin-bottom: 12px;
      }

      .about-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 0;
        font-size: 13px;
      }
      .about-row + .about-row { border-top: 1px solid var(--border); }
      .about-row-label { color: var(--text-1); }
      .about-row-value {
        color: var(--text-0);
        font-variant-numeric: tabular-nums;
      }

      .danger-zone { border-color: rgba(237, 66, 69, 0.35); }
      .danger-zone p {
        color: var(--text-1);
        font-size: 13px;
        margin-bottom: 14px;
      }

      .btn-uninstall {
        border: 1px solid rgba(237, 66, 69, 0.45);
        background: rgba(237, 66, 69, 0.12);
        color: var(--danger);
        font-size: 13px;
        font-weight: 600;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-uninstall:hover { background: rgba(237, 66, 69, 0.2); }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <img class="logo" src="../icons/icon48.png" alt="FreeMiD" />
        <h1>FreeMiD Settings</h1>
      </header>

      <section class="about">
        <div class="section-label">About</div>
        <div class="about-row">
          <span class="about-row-label">Extension version</span>
          <span class="about-row-value" id="ext-version"></span>
        </div>
        <div class="about-row">
          <span class="about-row-label">Native host version</span>
          <span class="about-row-value" id="host-version">Not connected</span>
        </div>
      </section>

      <section class="danger-zone">
        <div class="section-label">Uninstall</div>
        <p>
          Removing the native host and extension requires a few manual steps.
          This opens step-by-step instructions in a new tab.
        </p>
        <button type="button" class="btn-uninstall" id="btn-uninstall">
          Uninstall instructions
        </button>
      </section>
    </div>

    <script src="index.js" type="module"></script>
  </body>
</html>
