[package]
name = "freemid"
version.workspace = true
edition.workspace = true
description = "Free, open-source Discord Rich Presence for the web"
license.workspace = true

[[bin]]
name = "freemid"
path = "src/main.rs"

[features]
default = ["tray"]
tray = ["dep:tray-icon", "dep:winit", "dep:gtk"]

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = "0.24"
futures-util = { version = "0.3", features = ["sink"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
log = "0.4"
env_logger = "0.11"

# Tray (optional feature)
tray-icon = { version = "0.14", optional = true }
winit = { version = "0.29", optional = true }
gtk = { version = "0.18", optional = true }

[target.'cfg(windows)'.dependencies]
# tokio NamedPipeClient is in tokio::net::windows::named_pipe (included via "full")
