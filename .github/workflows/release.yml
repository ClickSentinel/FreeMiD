name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-signing-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate signing key matches TRUSTED_KEYS
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          sudo apt-get install -y -q minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > /tmp/test.sec
          echo "freemid signing key validation" > /tmp/test.txt
          printf '\n' | minisign -S -s /tmp/test.sec -m /tmp/test.txt -x /tmp/test.txt.minisig
          mapfile -t trusted_keys < <(grep -oP '"RW[A-Za-z0-9+/=]+"' native-host/src/update.rs | tr -d '"')
          if [[ ${#trusted_keys[@]} -eq 0 ]]; then
            echo "No trusted keys found in native-host/src/update.rs"
            exit 1
          fi
          matched=0
          for pubkey in "${trusted_keys[@]}"; do
            if minisign -V -P "$pubkey" -m /tmp/test.txt -x /tmp/test.txt.minisig 2>/dev/null; then
              echo "OK: MINISIGN_SECRET_KEY matches trusted key $pubkey"
              matched=1
              break
            fi
          done
          rm -f /tmp/test.sec /tmp/test.txt /tmp/test.txt.minisig
          if [[ "$matched" -eq 0 ]]; then
            echo "FAIL: MINISIGN_SECRET_KEY does not match any key in TRUSTED_KEYS"
            printf '  %s\n' "${trusted_keys[@]}"
            exit 1
          fi

  audit-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Security audit
        run: cargo install cargo-audit --locked && cargo audit

  # Build the extension zip (platform-independent)
  build-extension:
    needs: validate-signing-key
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Verify version consistency
        run: bash scripts/sync-version.sh --check

      - name: Verify tag version matches workspace version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          workspace_version=$(awk '
            /^\[workspace\.package\]$/ { in_section=1; next }
            /^\[/ { in_section=0 }
            in_section && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$workspace_version" != "$tag_version" ]]; then
            echo "Tag version ($tag_version) does not match workspace version ($workspace_version)"
            exit 1
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Write .env
        run: echo "VITE_DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}" > extension/.env

      - name: Install & build
        run: cd extension && npm ci && npm run build

      - name: Package
        run: cd extension/dist && zip -r ../../freemid-extension.zip .

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: freemid-extension
          path: freemid-extension.zip

  # Build native host binaries (one job per platform)
  build-native:
    needs: validate-signing-key
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: freemid-linux-x86_64
          - os: macos-latest
            artifact: freemid-macos-arm64
          - os: macos-latest
            artifact: freemid-macos-x86_64
            target: x86_64-apple-darwin
          - os: windows-2025
            artifact: freemid-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Add cross-compile target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target || 'native' }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }} ${{ runner.os == 'Windows' && '--bins' || '' }}
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}

      - name: Rename binary
        run: cp target/${{ matrix.target && format('{0}/', matrix.target) || '' }}release/freemid ${{ matrix.artifact }}
        if: runner.os != 'Windows'

      - name: Rename binary (Windows)
        run: copy target\release\freemid.exe ${{ matrix.artifact }}
        if: runner.os == 'Windows'

      - name: Collect setup binary (Windows)
        run: copy target\release\freemid-setup.exe freemid-setup.exe
        if: runner.os == 'Windows'

      - name: Collect apply binary (Windows)
        run: copy target\release\freemid-apply.exe freemid-apply-windows-x86_64.exe
        if: runner.os == 'Windows'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: runner.os == 'Windows'
        with:
          name: freemid-setup.exe
          path: freemid-setup.exe

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: runner.os == 'Windows'
        with:
          name: freemid-apply-windows-x86_64.exe
          path: freemid-apply-windows-x86_64.exe

  # Create the GitHub release with all artifacts
  release:
    needs: [audit-rust, build-extension, build-native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Collect files
        run: |
          cp artifacts/freemid-extension/freemid-extension.zip .
          cp artifacts/freemid-linux-x86_64/freemid-linux-x86_64 .
          cp artifacts/freemid-macos-arm64/freemid-macos-arm64 .
          cp artifacts/freemid-macos-x86_64/freemid-macos-x86_64 .
          cp artifacts/freemid-windows-x86_64.exe/freemid-windows-x86_64.exe .
          cp artifacts/freemid-setup.exe/freemid-setup.exe .
          cp artifacts/freemid-apply-windows-x86_64.exe/freemid-apply-windows-x86_64.exe .
          chmod +x freemid-linux-x86_64 freemid-macos-arm64 freemid-macos-x86_64

      - name: Generate checksums
        run: |
          sha256sum \
            freemid-linux-x86_64 \
            freemid-macos-arm64 \
            freemid-macos-x86_64 \
            freemid-windows-x86_64.exe \
            freemid-setup.exe \
            freemid-apply-windows-x86_64.exe \
            freemid-extension.zip \
            > checksums.sha256

      - name: Validate checksum coverage
        run: |
          required=(
            freemid-linux-x86_64
            freemid-macos-arm64
            freemid-macos-x86_64
            freemid-windows-x86_64.exe
            freemid-setup.exe
            freemid-apply-windows-x86_64.exe
            freemid-extension.zip
          )
          for f in "${required[@]}"; do
            grep -q "[[:space:]]$f$" checksums.sha256 || {
              echo "Missing checksum entry for $f"
              exit 1
            }
          done

      - name: Sign artifacts
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          sudo apt-get install -y -q minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > /tmp/freemid.sec
          for f in freemid-linux-x86_64 freemid-macos-arm64 freemid-macos-x86_64 freemid-windows-x86_64.exe; do
            printf '\n' | minisign -S -s /tmp/freemid.sec -m "$f" -x "$f.minisig"
          done
          rm -f /tmp/freemid.sec

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          files=(
            freemid-extension.zip
            freemid-linux-x86_64
            freemid-linux-x86_64.minisig
            freemid-macos-arm64
            freemid-macos-arm64.minisig
            freemid-macos-x86_64
            freemid-macos-x86_64.minisig
            freemid-windows-x86_64.exe
            freemid-windows-x86_64.exe.minisig
            freemid-setup.exe
            freemid-apply-windows-x86_64.exe
            checksums.sha256
            install/install.sh
            install/install.ps1
            install/uninstall.sh
            install/uninstall.ps1
          )

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            create_args=(--verify-tag --generate-notes)
            if [[ "$GITHUB_REF_NAME" == *-* ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "$GITHUB_REF_NAME" "${files[@]}" "${create_args[@]}"
          fi

  # Optional publish job; runs only when CWS_PUBLISH=true.
  publish-cws:
    needs: release
    runs-on: ubuntu-latest
    if: vars.CWS_PUBLISH == 'true'
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: freemid-extension

      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@fdfe79400af990f5145a319e834aee64907ccff4 # v6.0.0
        with:
          file-path: freemid-extension.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true
