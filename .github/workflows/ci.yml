name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - '**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify version consistency
        run: bash scripts/sync-version.sh --check

  installer-defaults:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify installer default extension ID consistency
        run: |
          set -euo pipefail

          sh_id=$(sed -n 's/^DEFAULT_EXTENSION_ID="\([a-z0-9]\+\)"$/\1/p' install/install.sh)
          ps_id=$(sed -n 's/^\$DefaultExtensionId = "\([a-z0-9]\+\)"$/\1/p' install/install.ps1)
          rs_id=$(sed -n 's/^    const DEFAULT_EXTENSION_ID: &str = "\([a-z0-9]\+\)";$/\1/p' installer/src/main.rs)

          if [[ -z "$sh_id" || -z "$ps_id" || -z "$rs_id" ]]; then
            echo "Failed to parse one or more default extension IDs"
            exit 1
          fi

          if [[ "$sh_id" != "$ps_id" || "$sh_id" != "$rs_id" ]]; then
            echo "Installer default extension IDs are inconsistent"
            echo "install.sh: $sh_id"
            echo "install.ps1: $ps_id"
            echo "installer/src/main.rs: $rs_id"
            exit 1
          fi

          echo "Default extension ID is consistent: $sh_id"

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build extension
        run: npm run build

  native-host:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build native host
        run: cargo build --release
        env:
          DISCORD_CLIENT_ID: placeholder-ci-build

  validate-signing-key:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate signing key matches TRUSTED_KEYS
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          sudo apt-get install -y -q minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > /tmp/test.sec
          echo "freemid signing key validation" > /tmp/test.txt
          printf '\n' | minisign -S -s /tmp/test.sec -m /tmp/test.txt -x /tmp/test.txt.minisig
          mapfile -t trusted_keys < <(grep -oP '"RW[A-Za-z0-9+/=]+"' native-host/src/update.rs | tr -d '"')
          if [[ ${#trusted_keys[@]} -eq 0 ]]; then
            echo "No trusted keys found in native-host/src/update.rs"
            exit 1
          fi
          matched=0
          for pubkey in "${trusted_keys[@]}"; do
            if minisign -V -P "$pubkey" -m /tmp/test.txt -x /tmp/test.txt.minisig 2>/dev/null; then
              echo "OK: MINISIGN_SECRET_KEY matches trusted key $pubkey"
              matched=1
              break
            fi
          done
          rm -f /tmp/test.sec /tmp/test.txt /tmp/test.txt.minisig
          if [[ "$matched" -eq 0 ]]; then
            echo "FAIL: MINISIGN_SECRET_KEY does not match any key in TRUSTED_KEYS"
            printf '  %s\n' "${trusted_keys[@]}"
            exit 1
          fi

  native-host-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check (Windows)
        run: cargo check
        env:
          DISCORD_CLIENT_ID: placeholder-ci-build

  native-host-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Lint
        run: cargo clippy -- -D warnings
        env:
          DISCORD_CLIENT_ID: placeholder-ci-build

      - name: Test
        run: cargo test
        env:
          DISCORD_CLIENT_ID: placeholder-ci-build

      - name: Check (macOS)
        run: cargo check
        env:
          DISCORD_CLIENT_ID: placeholder-ci-build
