name: Windows Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - dev/ux-improvements-auto-update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-artifacts:
    runs-on: windows-2025
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-artifacts-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Ensure DISCORD_CLIENT_ID fallback
        shell: pwsh
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DISCORD_CLIENT_ID)) {
            "DISCORD_CLIENT_ID=placeholder-ci-build" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "DISCORD_CLIENT_ID=$env:DISCORD_CLIENT_ID" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Build Windows binaries
        run: cargo build --release -p freemid -p freemid-installer --bins

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item target/release/freemid.exe artifacts/freemid-windows-x86_64.exe
          Copy-Item target/release/freemid-apply.exe artifacts/freemid-apply-windows-x86_64.exe
          Copy-Item target/release/freemid-setup.exe artifacts/freemid-setup.exe
          Copy-Item install/install.ps1 artifacts/install.ps1
          Copy-Item install/uninstall.ps1 artifacts/uninstall.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: freemid-windows-artifacts-${{ github.sha }}
          path: artifacts/*
